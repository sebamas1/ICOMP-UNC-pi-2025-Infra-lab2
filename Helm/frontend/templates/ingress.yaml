{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "tp1-frontend.fullname" . }}
  labels:
    app: {{ include "tp1-frontend.name" . }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ default "Prefix" .pathType }}
            backend:
              service:
                name: {{ if .service }}{{ .service.name }}{{ else }}{{ include "tp1-frontend.fullname" $ }}-service{{ end }}
                port:
                  number: {{ if .service }}{{ .service.port }}{{ else }}{{ $.Values.service.port }}{{ end }}
          {{- end }}
    {{- end }}
{{- end }}
